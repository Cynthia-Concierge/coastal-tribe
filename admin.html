<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coastal Tribe - Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div id="login-screen" class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-lg shadow-lg max-w-md w-full">
            <h1 class="text-3xl font-bold mb-6 text-center">Admin Login</h1>
            <form id="login-form" class="space-y-4">
                <input type="password" id="password" placeholder="Enter admin password" 
                    class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-500">
                <button type="submit" 
                    class="w-full bg-blue-500 hover:bg-blue-600 text-white font-semibold py-3 rounded-lg">
                    Login
                </button>
            </form>
        </div>
    </div>

    <div id="admin-panel" class="hidden min-h-screen p-8">
        <div class="max-w-6xl mx-auto">
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-4xl font-bold">Event Management</h1>
                <button onclick="showForm()" class="px-6 py-3 bg-blue-500 hover:bg-blue-600 text-white font-semibold rounded-lg">
                    + New Event
                </button>
            </div>

            <div id="event-form" class="hidden bg-white p-8 rounded-lg shadow-lg mb-8">
                <h2 class="text-2xl font-bold mb-6">Create New Event</h2>
                <form id="create-event-form" class="space-y-4">
                    <input type="text" id="event-title" placeholder="Event Title" required
                        class="w-full px-4 py-3 border rounded-lg">
                    <div class="grid md:grid-cols-2 gap-4">
                        <input type="date" id="event-date" required class="w-full px-4 py-3 border rounded-lg">
                        <input type="text" id="event-time" placeholder="Time (e.g., 7:00 PM)" required class="w-full px-4 py-3 border rounded-lg">
                    </div>
                    <input type="text" id="event-location" placeholder="Location" required class="w-full px-4 py-3 border rounded-lg">
                    <textarea id="event-description" placeholder="Event Description" required rows="4" class="w-full px-4 py-3 border rounded-lg resize-none"></textarea>
                    <input type="url" id="event-image" placeholder="Image URL (optional)" class="w-full px-4 py-3 border rounded-lg">
                    <div class="grid md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold mb-2">Price ($)</label>
                            <input type="number" id="event-price" value="0" min="0" step="0.01" required class="w-full px-4 py-3 border rounded-lg">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold mb-2">Tickets Available</label>
                            <input type="number" id="event-tickets" value="50" min="1" required class="w-full px-4 py-3 border rounded-lg">
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-green-500 hover:bg-green-600 text-white font-semibold py-3 rounded-lg">
                        Create Event
                    </button>
                </form>
            </div>

            <div class="bg-white p-8 rounded-lg shadow-lg">
                <h2 class="text-2xl font-bold mb-6">Your Events</h2>
                <div id="events-list"></div>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = 'coastal2026';
        let events = JSON.parse(localStorage.getItem('coastalTribeEvents') || '[]');

        // Login
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const password = document.getElementById('password').value;
            if (password === ADMIN_PASSWORD) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                loadEvents();
            } else {
                alert('Incorrect password');
            }
        });

        function showForm() {
            document.getElementById('event-form').classList.toggle('hidden');
        }

        // Create Event
        document.getElementById('create-event-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const event = {
                id: Date.now().toString(),
                title: document.getElementById('event-title').value,
                date: document.getElementById('event-date').value,
                time: document.getElementById('event-time').value,
                location: document.getElementById('event-location').value,
                description: document.getElementById('event-description').value,
                imageUrl: document.getElementById('event-image').value,
                price: parseFloat(document.getElementById('event-price').value),
                ticketsAvailable: parseInt(document.getElementById('event-tickets').value)
            };

            events.push(event);
            localStorage.setItem('coastalTribeEvents', JSON.stringify(events));
            
            this.reset();
            document.getElementById('event-form').classList.add('hidden');
            loadEvents();
            
            alert('Event created! Note: To see this on your main site, you\'ll need to add the events display code.');
        });

        function loadEvents() {
            const list = document.getElementById('events-list');
            if (events.length === 0) {
                list.innerHTML = '<p class="text-gray-600">No events created yet.</p>';
                return;
            }

            list.innerHTML = events.map(event => `
                <div class="border rounded-lg p-4 mb-4 hover:bg-gray-50">
                    <h3 class="text-xl font-bold">${event.title}</h3>
                    <p class="text-gray-600">${event.date} at ${event.time}</p>
                    <p class="text-gray-600">${event.location}</p>
                    <p class="text-sm text-gray-500 mt-2">Price: $${event.price} | Tickets: ${event.ticketsAvailable}</p>
                    <button onclick="deleteEvent('${event.id}')" class="mt-2 text-red-500 text-sm">Delete</button>
                </div>
            `).join('');
        }

        function deleteEvent(id) {
            if (confirm('Delete this event?')) {
                events = events.filter(e => e.id !== id);
                localStorage.setItem('coastalTribeEvents', JSON.stringify(events));
                loadEvents();
            }
        }
    </script>
</body>
</html>
